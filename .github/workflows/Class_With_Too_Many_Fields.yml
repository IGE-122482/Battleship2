name: Qodana - Class With Too Many Fields
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  qodana:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Run Qodana
        uses: JetBrains/qodana-action@v2023.3
        with:
          args: --fail-threshold,100
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
