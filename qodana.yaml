version: "1.0"
linter: jetbrains/qodana-jvm

inspections:
  - name: ClassWithTooManyMethods
    enabled: true
    options:
      methodCountLimit: 30
      ignoreSimpleGettersAndSetters: true
      ignoreOverridingMethods: false

  - name: OverlyCoupledClass
    enabled: true
    options:
      threshold: 40

  - name: OverlyComplexClass
    enabled: true
    options:
      complexityLimit: 80

  - name: ClassWithTooManyFields
    enabled: true
    options:
      fieldCountLimit: 10
      ignoreStaticFields: false
      ignoreConstantFields: true
